<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sonicra — Your Music</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#1ed760" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Sonicra" />
  <link rel="apple-touch-icon" href="icon-192.png" />
</head>
<body>

  <!-- APP -->
  <div id="app" class="app">

    <!-- SIDEBAR (desktop only) -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <svg width="32" height="32" viewBox="0 0 48 48" fill="none">
          <circle cx="24" cy="24" r="24" fill="var(--accent)"/>
          <path d="M14 24 Q24 14 34 24 Q24 34 14 24Z" fill="white"/>
          <circle cx="24" cy="24" r="5" fill="var(--accent)"/>
        </svg>
        <span>Sonicra</span>
      </div>
      <nav class="sidebar-nav">
        <button class="nav-btn active" onclick="showView('home')" data-view="home">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
          Home
        </button>
        <button class="nav-btn" onclick="showView('search')" data-view="search">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
          Search
        </button>
        <button class="nav-btn" onclick="showView('liked')" data-view="liked">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
          Liked Songs
        </button>
        <button class="nav-btn" onclick="showView('playlists')" data-view="playlists">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M15 6H3v2h12V6zm0 4H3v2h12v-2zM3 16h8v-2H3v2zM17 6v8.18c-.31-.11-.65-.18-1-.18-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3V8h3V6h-5z"/></svg>
          Playlists
        </button>
      </nav>
      <div class="sidebar-playlists">
        <div class="sp-header">
          <span>Your Playlists</span>
          <button class="icon-btn" onclick="createPlaylist()">+</button>
        </div>
        <div id="sidebar-playlist-list" class="sp-list"></div>
      </div>
      <div class="sidebar-footer">
        <button class="theme-toggle" onclick="toggleTheme()">
          <span id="theme-icon">☀️</span>
        </button>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">

      <!-- HOME -->
      <div id="view-home" class="view active">
        <div class="view-header">
          <h1 id="greeting">Good evening</h1>
        </div>
        <div class="section">
          <h2 class="section-title">Search & Play</h2>
          <p class="section-sub">Search any song — full playback via YouTube</p>
          <div class="home-search-wrap">
            <input type="text" id="home-search" class="search-bar" placeholder="Search songs, artists, albums..."
              oninput="debounceSearch(this.value,'home-results')"
              onkeydown="if(event.key==='Enter') doSearch(this.value,'home-results')" />
            <div class="search-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            </div>
          </div>
          <div id="home-results" class="track-grid"></div>
        </div>
      </div>

      <!-- SEARCH -->
      <div id="view-search" class="view">
        <div class="view-header"><h1>Search</h1></div>
        <div class="search-wrap">
          <input type="text" id="main-search" class="search-bar large" placeholder="Artists, songs, albums..."
            oninput="debounceSearch(this.value,'search-results')" />
          <div class="search-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
          </div>
        </div>
        <div id="search-results" class="track-list-container"></div>
      </div>

      <!-- LIKED SONGS -->
      <div id="view-liked" class="view">
        <div class="liked-header">
          <div class="liked-hero">
            <div class="liked-icon">♥</div>
            <div>
              <p class="liked-label">Collection</p>
              <h1>Liked Songs</h1>
              <p id="liked-count" class="liked-count">0 songs</p>
            </div>
          </div>
          <button class="btn-primary small" onclick="playAllLiked()">▶ Play All</button>
        </div>
        <div id="liked-list" class="track-list-container"></div>
      </div>

      <!-- PLAYLISTS -->
      <div id="view-playlists" class="view">
        <div class="view-header" style="display:flex;align-items:center;justify-content:space-between;">
          <h1>Playlists</h1>
          <button class="btn-primary" onclick="createPlaylist()">+ New</button>
        </div>
        <div id="playlists-grid" class="playlists-grid"></div>
      </div>

      <!-- PLAYLIST DETAIL -->
      <div id="view-playlist-detail" class="view">
        <div class="view-header">
          <button class="back-btn" onclick="showView('playlists')">← Back</button>
          <div class="playlist-detail-header">
            <div class="playlist-cover">♪</div>
            <div>
              <p class="playlist-label">Playlist</p>
              <h1 id="pl-name">Playlist</h1>
              <p id="pl-count" class="liked-count"></p>
            </div>
          </div>
          <button class="btn-primary small" onclick="playAllPlaylist()">▶ Play All</button>
        </div>
        <div id="playlist-track-list" class="track-list-container"></div>
      </div>

    </main>
  </div>

  <!-- YOUTUBE PLAYER (invisible) -->
  <div id="yt-container" style="position:fixed;width:1px;height:1px;opacity:0;pointer-events:none;bottom:0;left:0;overflow:hidden;">
    <div id="yt-player"></div>
  </div>

  <!-- PLAYER BAR -->
  <div id="player-bar" class="player-bar">
    <div class="player-track">
      <div id="player-art" class="player-art"></div>
      <div class="player-info">
        <div id="player-name" class="player-name">—</div>
        <div id="player-artist" class="player-artist">—</div>
      </div>
      <button id="like-btn" class="like-btn" onclick="toggleLikeCurrent()">♡</button>
    </div>
    <div class="player-controls">
      <button class="ctrl-btn" onclick="prevTrack()">⏮</button>
      <button class="play-pause-btn" id="play-pause-btn" onclick="togglePlayPause()">▶</button>
      <button class="ctrl-btn" onclick="nextTrack()">⏭</button>
    </div>
    <div class="player-right">
      <span id="current-time" class="time-label">0:00</span>
      <div class="progress-wrap" onclick="seekTo(event)">
        <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
      </div>
      <span id="duration-label" class="time-label">0:00</span>
      <div class="volume-wrap">
        <span>🔊</span>
        <input type="range" id="volume-slider" min="0" max="100" step="1" value="80" oninput="setVolume(this.value)" class="volume-slider" />
      </div>
      <button class="add-to-playlist-btn" onclick="openAddToPlaylist()">+</button>
    </div>
  </div>

  <!-- MOBILE BOTTOM NAV (hidden on desktop via CSS) -->
  <nav class="bottom-nav">
    <button class="bnav-btn active" onclick="showViewMobile('home')" data-mv="home">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      <span>Home</span>
    </button>
    <button class="bnav-btn" onclick="showViewMobile('search')" data-mv="search">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      <span>Search</span>
    </button>
    <button class="bnav-btn" onclick="showViewMobile('liked')" data-mv="liked">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
      <span>Liked</span>
    </button>
    <button class="bnav-btn" onclick="showViewMobile('playlists')" data-mv="playlists">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15 6H3v2h12V6zm0 4H3v2h12v-2zM3 16h8v-2H3v2zM17 6v8.18c-.31-.11-.65-.18-1-.18-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3V8h3V6h-5z"/></svg>
      <span>Library</span>
    </button>
    <button class="bnav-btn" onclick="toggleTheme()">
      <span id="theme-icon-mobile" style="font-size:20px">☀️</span>
      <span>Theme</span>
    </button>
  </nav>

  <!-- ADD TO PLAYLIST MODAL -->
  <div id="playlist-modal" class="modal-overlay hidden">
    <div class="modal-box small">
      <button class="modal-close" onclick="closePlaylistModal()">✕</button>
      <h3>Add to Playlist</h3>
      <div id="playlist-modal-list" class="modal-list"></div>
      <button class="btn-primary" onclick="createPlaylistFromModal()">+ New Playlist</button>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toast" class="toast hidden"></div>

  <script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
